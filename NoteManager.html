<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NoteManager</title>
  <style>
    :root {
      --paper: #f8f2e8;
      --surface: #fffdf8;
      --panel: #fffaf2;
      --ink: #151515;
      --muted: #57524b;
      --line: #1b1b1b;
      --shadow: 10px 10px 0 rgba(21, 21, 21, 0.12);
      --radius: 30px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.75), transparent 38%),
        linear-gradient(135deg, #f7efe2 0%, #f1e5d4 100%);
      color: var(--ink);
      font-family: "Trebuchet MS", "Gill Sans", sans-serif;
    }

    body {
      padding: 24px;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
      color: inherit;
    }

    .app {
      position: relative;
      width: min(1100px, 100%);
      min-height: calc(100vh - 48px);
      margin: 0 auto;
      border: 5px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(255, 249, 239, 0.96)),
        repeating-linear-gradient(
          180deg,
          rgba(21, 21, 21, 0.02) 0,
          rgba(21, 21, 21, 0.02) 38px,
          transparent 38px,
          transparent 76px
        );
      box-shadow: var(--shadow);
      overflow: hidden;
      border-radius: 24px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 18px 20px 14px;
      border-bottom: 5px solid var(--line);
      background: rgba(255, 255, 255, 0.8);
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(2.3rem, 4vw, 3.4rem);
      line-height: 0.95;
      letter-spacing: 0.03em;
    }

    .brand p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .search-shell {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: min(420px, 48vw);
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      padding: 10px 12px 10px 16px;
      background: var(--surface);
      border: 3px solid var(--line);
      border-radius: 999px;
    }

    .search-box input {
      width: 100%;
      border: 0;
      background: transparent;
      outline: 0;
    }

    .round-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 62px;
      height: 62px;
      border: 4px solid var(--line);
      border-radius: 50%;
      background: linear-gradient(180deg, #fff, #f3eadc);
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
      box-shadow: 0 6px 0 rgba(21, 21, 21, 0.08);
    }

    .round-button:hover {
      transform: translateY(-2px) rotate(-3deg);
      box-shadow: 0 10px 0 rgba(21, 21, 21, 0.1);
    }

    .round-button:active {
      transform: translateY(1px);
      box-shadow: 0 4px 0 rgba(21, 21, 21, 0.08);
    }

    .round-button svg {
      width: 28px;
      height: 28px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 20px;
      border-bottom: 2px dashed rgba(21, 21, 21, 0.3);
      background: rgba(255, 252, 245, 0.9);
    }

    .toolbar-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .toolbar select,
    .toolbar .info-pill {
      border: 3px solid var(--line);
      border-radius: 999px;
      background: var(--surface);
      padding: 10px 16px;
    }

    .toolbar .info-pill {
      font-size: 0.95rem;
      color: var(--muted);
    }

    .board {
      position: relative;
      min-height: calc(100vh - 220px);
      padding: 22px 20px 110px;
    }

    .notes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
      align-items: start;
    }

    .note-card {
      position: relative;
      min-height: 190px;
      padding: 18px 18px 16px;
      border: 4px solid var(--line);
      border-radius: 24px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(255, 248, 236, 0.95));
      box-shadow: 8px 8px 0 rgba(21, 21, 21, 0.1);
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .note-card:hover {
      transform: translate(-2px, -4px);
      box-shadow: 12px 12px 0 rgba(21, 21, 21, 0.12);
    }

    .note-card.pinned {
      background:
        linear-gradient(180deg, rgba(255, 251, 207, 0.96), rgba(255, 245, 218, 0.94));
    }

    .note-card__pin {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 42px;
      height: 42px;
      border: 3px solid var(--line);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.72);
      display: grid;
      place-items: center;
      cursor: pointer;
    }

    .note-card__pin svg {
      width: 18px;
      height: 18px;
    }

    .note-card h2 {
      margin: 0 48px 10px 0;
      font-size: 1.55rem;
      line-height: 1;
      word-break: break-word;
    }

    .note-card p {
      margin: 0;
      color: #302d29;
      line-height: 1.45;
      word-break: break-word;
    }

    .note-card__meta {
      margin-top: 18px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .empty-state {
      display: grid;
      place-items: center;
      min-height: 48vh;
      padding: 24px;
      text-align: center;
      border: 4px dashed rgba(21, 21, 21, 0.35);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.45);
    }

    .empty-state h2 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 4vw, 3rem);
    }

    .empty-state p {
      margin: 0;
      max-width: 460px;
      color: var(--muted);
      line-height: 1.55;
    }

    .fab {
      position: absolute;
      right: 24px;
      bottom: 24px;
      width: 84px;
      height: 84px;
      border-width: 5px;
      background: linear-gradient(180deg, #fff6ec, #f0dfc5);
      z-index: 3;
    }

    .fab svg {
      width: 34px;
      height: 34px;
    }

    .editor-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(14, 14, 14, 0.35);
      backdrop-filter: blur(6px);
      z-index: 30;
    }

    .editor-backdrop.is-open {
      display: flex;
    }

    .editor {
      position: relative;
      width: min(820px, 100%);
      min-height: min(720px, calc(100vh - 40px));
      padding: 26px 24px 110px;
      border: 5px solid var(--line);
      border-radius: 28px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(255, 247, 233, 0.96));
      box-shadow: 14px 14px 0 rgba(21, 21, 21, 0.14);
      overflow: hidden;
    }

    .editor-actions-top {
      position: absolute;
      top: 18px;
      right: 18px;
      display: flex;
      gap: 12px;
    }

    .editor .round-button {
      width: 66px;
      height: 66px;
    }

    .editor__title {
      width: calc(100% - 170px);
      margin: 10px 0 18px;
      border: 0;
      border-bottom: 4px solid var(--line);
      outline: 0;
      background: transparent;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      padding: 6px 0 12px;
    }

    .editor__content {
      width: 100%;
      min-height: 420px;
      resize: vertical;
      border: 0;
      outline: 0;
      background: transparent;
      font-size: 1.15rem;
      line-height: 1.7;
      padding: 0;
    }

    .editor__footer {
      position: absolute;
      left: 24px;
      right: 24px;
      bottom: 20px;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }

    .editor__meta {
      color: var(--muted);
      line-height: 1.45;
    }

    .editor__footer-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .action-chip {
      border: 3px solid var(--line);
      border-radius: 999px;
      padding: 12px 18px;
      background: var(--surface);
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease;
    }

    .action-chip:hover {
      transform: translateY(-1px);
      background: #fff4df;
    }

    .danger {
      background: #fff0ed;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 820px) {
      body {
        padding: 12px;
      }

      .app {
        min-height: calc(100vh - 24px);
      }

      .topbar {
        flex-direction: column;
        align-items: stretch;
      }

      .search-shell {
        min-width: 100%;
      }

      .brand h1 {
        font-size: 2.6rem;
      }

      .editor {
        min-height: calc(100vh - 24px);
        padding: 94px 18px 120px;
      }

      .editor-actions-top {
        top: 14px;
        right: 14px;
      }

      .editor__title {
        width: 100%;
        margin-top: 0;
      }

      .editor .round-button {
        width: 58px;
        height: 58px;
      }

      .fab {
        width: 76px;
        height: 76px;
        right: 18px;
        bottom: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <h1>Заметки</h1>
        <p>Личный менеджер заметок с поиском, закреплением и сортировкой.</p>
      </div>

      <div class="search-shell">
        <label class="search-box" for="searchInput">
          <span class="sr-only">Поиск по заметкам</span>
          <input id="searchInput" type="search" placeholder="Поиск по названию и содержимому">
        </label>
        <button class="round-button" id="searchButton" type="button" aria-label="Перейти к поиску">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="6.5"></circle>
            <path d="M16 16l4.5 4.5"></path>
          </svg>
        </button>
      </div>
    </header>

    <section class="toolbar">
      <div class="toolbar-group">
        <label class="sr-only" for="sortSelect">Сортировка</label>
        <select id="sortSelect">
          <option value="updated-desc">Сначала новые</option>
          <option value="updated-asc">Сначала старые</option>
          <option value="created-desc">По дате создания</option>
          <option value="title-asc">По названию</option>
        </select>
        <div class="info-pill" id="notesCount">0 заметок</div>
      </div>

      <div class="toolbar-group">
        <div class="info-pill" id="statusPill">Готово к работе</div>
      </div>
    </section>

    <section class="board">
      <div class="notes-grid" id="notesGrid"></div>
      <button class="round-button fab" id="addButton" type="button" aria-label="Создать заметку">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 20h4l10-10-4-4L4 16v4Z"></path>
          <path d="M12.5 5.5l4 4"></path>
        </svg>
      </button>
    </section>
  </main>

  <div class="editor-backdrop" id="editorBackdrop" aria-hidden="true">
    <section class="editor" role="dialog" aria-modal="true" aria-labelledby="editorTitleLabel">
      <div class="editor-actions-top">
        <button class="round-button" id="cancelButton" type="button" aria-label="Закрыть редактор">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <path d="M6 6l12 12"></path>
            <path d="M18 6L6 18"></path>
          </svg>
        </button>
        <button class="round-button" id="saveButton" type="button" aria-label="Сохранить заметку">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12.5l4.2 4.2L19 7"></path>
          </svg>
        </button>
      </div>

      <label class="sr-only" for="noteTitle" id="editorTitleLabel">Название заметки</label>
      <input class="editor__title" id="noteTitle" type="text" placeholder="Название">

      <label class="sr-only" for="noteContent">Содержимое заметки</label>
      <textarea class="editor__content" id="noteContent" placeholder="содержание"></textarea>

      <div class="editor__footer">
        <div class="editor__meta" id="editorMeta">Новая заметка</div>
        <div class="editor__footer-actions">
          <button class="action-chip danger" id="deleteButton" type="button">Удалить</button>
          <button class="action-chip" id="pinButton" type="button">Закрепить</button>
        </div>
      </div>
    </section>
  </div>

  <script>
    const TOKEN_KEY = "note-manager-demo-token";
    const DEMO_CREDENTIALS = {
      email: "demo@notemanager.local",
      password: "demo12345"
    };

    const state = {
      notes: [],
      search: "",
      sort: "updated-desc",
      activeId: null,
      editorOpen: false,
      token: localStorage.getItem(TOKEN_KEY),
      errorMessage: ""
    };

    let searchTimer = null;

    const searchInput = document.getElementById("searchInput");
    const searchButton = document.getElementById("searchButton");
    const sortSelect = document.getElementById("sortSelect");
    const notesGrid = document.getElementById("notesGrid");
    const notesCount = document.getElementById("notesCount");
    const statusPill = document.getElementById("statusPill");
    const addButton = document.getElementById("addButton");
    const editorBackdrop = document.getElementById("editorBackdrop");
    const noteTitle = document.getElementById("noteTitle");
    const noteContent = document.getElementById("noteContent");
    const editorMeta = document.getElementById("editorMeta");
    const saveButton = document.getElementById("saveButton");
    const cancelButton = document.getElementById("cancelButton");
    const deleteButton = document.getElementById("deleteButton");
    const pinButton = document.getElementById("pinButton");

    function setStatus(text) {
      statusPill.textContent = text;
    }

    function getActiveNote() {
      return state.notes.find((note) => note.id === state.activeId) || null;
    }

    function formatDate(dateValue) {
      return new Intl.DateTimeFormat("ru-RU", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      }).format(new Date(dateValue));
    }

    function trimPreview(text, length) {
      return text.length > length ? `${text.slice(0, length).trim()}...` : text;
    }

    function pluralize(number, forms) {
      const mod10 = number % 10;
      const mod100 = number % 100;

      if (mod10 === 1 && mod100 !== 11) {
        return forms[0];
      }
      if (mod10 >= 2 && mod10 <= 4 && (mod100 < 10 || mod100 >= 20)) {
        return forms[1];
      }
      return forms[2];
    }

    function escapeHtml(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function getPinIcon() {
      return `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14.8 4.5l4.7 4.7"></path>
          <path d="M9.8 9.2l5.7-5.7 4.2 4.2-5.7 5.7"></path>
          <path d="M10.6 10l3.4 3.4"></path>
          <path d="M8 12.5l3.5 3.5"></path>
          <path d="M7.5 16.5l-3 4"></path>
        </svg>
      `;
    }

    async function apiRequest(path, options = {}, useAuth = true) {
      const headers = {
        "Content-Type": "application/json",
        ...(options.headers || {})
      };

      if (useAuth && state.token) {
        headers.Authorization = `Bearer ${state.token}`;
      }

      const response = await fetch(path, {
        method: options.method || "GET",
        headers,
        body: options.body ? JSON.stringify(options.body) : undefined
      });

      const text = await response.text();
      const data = text ? JSON.parse(text) : null;

      if (!response.ok) {
        const error = new Error(data && data.message ? data.message : "Ошибка запроса.");
        error.status = response.status;
        throw error;
      }

      return data;
    }

    async function ensureDemoSession() {
      if (state.token) {
        return;
      }

      const loginResponse = await apiRequest("/auth/login", {
        method: "POST",
        body: DEMO_CREDENTIALS
      }, false);

      state.token = loginResponse.token;
      localStorage.setItem(TOKEN_KEY, state.token);
    }

    async function loadNotesFromServer() {
      await ensureDemoSession();

      const params = new URLSearchParams();
      params.set("sort", state.sort);

      if (state.search.trim()) {
        params.set("search", state.search.trim());
      }

      try {
        state.notes = await apiRequest(`/notes?${params.toString()}`);
        state.errorMessage = "";
      } catch (error) {
        if (error.status === 401) {
          state.token = "";
          localStorage.removeItem(TOKEN_KEY);
          await ensureDemoSession();
          state.notes = await apiRequest(`/notes?${params.toString()}`);
          state.errorMessage = "";
          return;
        }

        throw error;
      }
    }

    function renderEmptyState(title, description) {
      notesGrid.innerHTML = `
        <article class="empty-state">
          <div>
            <h2>${escapeHtml(title)}</h2>
            <p>${escapeHtml(description)}</p>
          </div>
        </article>
      `;
    }

    function renderNotes() {
      notesGrid.innerHTML = "";
      notesCount.textContent = `${state.notes.length} ${pluralize(state.notes.length, ["заметка", "заметки", "заметок"])}`;

      if (state.errorMessage) {
        renderEmptyState("Нет соединения с сервером", state.errorMessage);
        return;
      }

      if (!state.notes.length) {
        renderEmptyState(
          "Пока пусто",
          "Создай первую заметку кнопкой с карандашом или измени поисковый запрос."
        );
        return;
      }

      state.notes.forEach((note) => {
        const card = document.createElement("article");
        card.className = `note-card${note.pinned ? " pinned" : ""}`;
        card.dataset.id = note.id;
        card.innerHTML = `
          <button class="note-card__pin" type="button" aria-label="${note.pinned ? "Открепить" : "Закрепить"}">
            ${getPinIcon()}
          </button>
          <h2>${escapeHtml(note.title || "Без названия")}</h2>
          <p>${escapeHtml(trimPreview(note.content || "Пустая заметка", 160))}</p>
          <div class="note-card__meta">
            <span>${note.pinned ? "Закреплена" : "Обычная"}</span>
            <span>${formatDate(note.updatedAt)}</span>
          </div>
        `;

        card.addEventListener("click", () => openEditor(note.id));
        card.querySelector(".note-card__pin").addEventListener("click", async (event) => {
          event.stopPropagation();
          await togglePin(note.id);
        });

        notesGrid.append(card);
      });
    }

    function openEditor(noteId = null) {
      state.activeId = noteId;
      state.editorOpen = true;
      editorBackdrop.classList.add("is-open");
      editorBackdrop.setAttribute("aria-hidden", "false");

      const note = getActiveNote();

      noteTitle.value = note ? note.title : "";
      noteContent.value = note ? note.content : "";
      editorMeta.innerHTML = note
        ? `Создано: ${formatDate(note.createdAt)}<br>Изменено: ${formatDate(note.updatedAt)}`
        : "Новая заметка";
      deleteButton.hidden = !note;
      pinButton.disabled = !note;
      pinButton.textContent = note && note.pinned ? "Открепить" : "Закрепить";

      requestAnimationFrame(() => noteTitle.focus());
    }

    function closeEditor() {
      state.activeId = null;
      state.editorOpen = false;
      editorBackdrop.classList.remove("is-open");
      editorBackdrop.setAttribute("aria-hidden", "true");
    }

    async function refreshNotes(statusText) {
      try {
        setStatus("Подключение к серверу...");
        await loadNotesFromServer();
        renderNotes();
        setStatus(statusText || "Данные загружены с сервера.");
      } catch (error) {
        state.notes = [];
        state.errorMessage = error.message || "Не удалось получить данные с сервера.";
        renderNotes();
        setStatus("Ошибка сервера");
      }
    }

    async function saveNote() {
      const title = noteTitle.value.trim();
      const content = noteContent.value.trim();

      if (!title && !content) {
        setStatus("Добавь название или текст, чтобы сохранить заметку.");
        noteTitle.focus();
        return;
      }

      try {
        const existingNote = getActiveNote();
        const payload = {
          title: title || "Без названия",
          content
        };

        if (existingNote) {
          await apiRequest(`/notes/${existingNote.id}`, {
            method: "PUT",
            body: payload
          });
          closeEditor();
          await refreshNotes("Заметка обновлена.");
          return;
        }

        await apiRequest("/notes", {
          method: "POST",
          body: payload
        });
        closeEditor();
        await refreshNotes("Заметка создана.");
      } catch (error) {
        setStatus(error.message || "Не удалось сохранить заметку.");
      }
    }

    async function deleteActiveNote() {
      const note = getActiveNote();

      if (!note) {
        return;
      }

      try {
        await apiRequest(`/notes/${note.id}`, {
          method: "DELETE"
        });
        closeEditor();
        await refreshNotes("Заметка удалена.");
      } catch (error) {
        setStatus(error.message || "Не удалось удалить заметку.");
      }
    }

    async function togglePin(noteId) {
      const note = state.notes.find((item) => item.id === noteId);

      if (!note) {
        return;
      }

      try {
        await apiRequest(`/notes/${note.id}`, {
          method: "PUT",
          body: {
            pinned: !note.pinned
          }
        });

        await refreshNotes(!note.pinned ? "Заметка закреплена." : "Заметка откреплена.");

        if (state.activeId === noteId && state.editorOpen) {
          const updatedNote = getActiveNote();
          pinButton.textContent = updatedNote && updatedNote.pinned ? "Открепить" : "Закрепить";
          editorMeta.innerHTML = updatedNote
            ? `Создано: ${formatDate(updatedNote.createdAt)}<br>Изменено: ${formatDate(updatedNote.updatedAt)}`
            : "Новая заметка";
        }
      } catch (error) {
        setStatus(error.message || "Не удалось изменить статус заметки.");
      }
    }

    searchInput.addEventListener("input", (event) => {
      state.search = event.target.value;
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        refreshNotes(state.search ? `Поиск: "${state.search}"` : "Данные загружены с сервера.");
      }, 250);
    });

    searchButton.addEventListener("click", () => searchInput.focus());

    sortSelect.addEventListener("change", async (event) => {
      state.sort = event.target.value;
      await refreshNotes("Порядок заметок обновлен.");
    });

    addButton.addEventListener("click", () => openEditor());
    saveButton.addEventListener("click", saveNote);
    cancelButton.addEventListener("click", closeEditor);
    deleteButton.addEventListener("click", deleteActiveNote);
    pinButton.addEventListener("click", async () => {
      const active = getActiveNote();

      if (active) {
        await togglePin(active.id);
      }
    });

    editorBackdrop.addEventListener("click", (event) => {
      if (event.target === editorBackdrop) {
        closeEditor();
      }
    });

    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && state.editorOpen) {
        closeEditor();
      }

      if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "s" && state.editorOpen) {
        event.preventDefault();
        saveNote();
      }
    });

    refreshNotes("Сервер подключен. Работает demo-пользователь.");
  </script>
</body>
</html>
